services:
  - type: web
    name: portfolio-backtester-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false # set in Render dashboard after deploying
      - key: PYTHON_VERSION
        value: "3.12"
